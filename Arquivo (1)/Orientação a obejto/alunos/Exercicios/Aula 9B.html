<!--
Crie um objeto chamado placarFaltas com a propriedade totalFaltas valendo 0. 
Escreva dois métodos: cometerFalta() (que soma 1) e anularFalta() (que diminui 1, 
mas não pode deixar cair para menos de 0). Amarre os métodos aos botões de + e - correspondentes.
-->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>9B - Exercício: Faltas</title>
</head>
<body>
    <h2>Exercício 9B: Contador de Faltas da Partida</h2>
    <p>Faltas Cometidas: <strong id="numFaltas">0</strong></p>
    <button onclick="addFalta()">+ Registrar Falta</button>
    <button onclick="subFalta()">- Cancelar Falta</button>

    <script>
      const placarFaltas = {
            totalFaltas: 0,
            cometerFalta: function() {
                this.totalFaltas++;
            },
            anularFalta: function() {
                if (this.totalFaltas > 0) {
                    this.totalFaltas--;
                }
            }
        };

        function addFalta() {
            placarFaltas.cometerFalta();
            document.getElementById("numFaltas").innerText = placarFaltas.totalFaltas;
        }

        function subFalta() {
            placarFaltas.anularFalta();
            document.getElementById("numFaltas").innerText = placarFaltas.totalFaltas;
        }
    </script>
</body>
</html>
