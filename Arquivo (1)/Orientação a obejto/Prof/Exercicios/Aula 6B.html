<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>6B - Exercício: Voo</title>
</head>
<body>
    <h2>Exercício 6B: Sistema de Passagens Aéreas</h2>
    <p>Assentos Disponíveis: <span id="txtAssentos">5</span></p>

    <input type="number" id="valPassagens" placeholder="Quantas passagens?">
    <button onclick="executarCompra()">Comprar</button>
    <p id="msgVoo" style="color: blue;"></p>

    <script>
        const voo = {
    assentosLivres: 5,
    comprarPassagem: function(quantidade) {
        if (quantidade <= this.assentosLivres) {
            this.assentosLivres -= quantidade;
            return "Passagens compradas com sucesso!";
        } else {
            return "Erro: Não há poltronas suficientes para esse pedido.";
        }
    }
};

function executarCompra() {
    let qtd = Number(document.getElementById("valPassagens").value);
    let aviso = voo.comprarPassagem(qtd);
    
    document.getElementById("txtAssentos").innerText = voo.assentosLivres;
    document.getElementById("msgVoo").innerText = aviso;
}
    </script>
</body>
</html>
