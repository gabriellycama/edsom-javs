<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>5B - Exercício: Combustível</title>
</head>
<body>
    <h2>Exercício 5B: Tanque de Combustível</h2>
    <p>Gasolina no Tanque: <span id="txtGasolina">20</span> Litros</p>

    <input type="number" id="valGasolina" placeholder="Quantos litros?">
    <button onclick="executarAbastecimento()">Abastecer</button>

    <script>
        const carro = {
    combustivel: 20,
    adicionarGasolina: function(litros) {
        this.combustivel += litros;
    }
};

function executarAbastecimento() {
    let litrosInformados = Number(document.getElementById("valGasolina").value);
    carro.adicionarGasolina(litrosInformados);
    document.getElementById("txtGasolina").innerText = carro.combustivel;
}
    </script>
</body>
</html>
